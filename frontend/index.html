<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="LogoCarrefour.png">
    <title>Solicitar Asesor - Carrefour</title>
    <style>
        :root {
            --carrefour-blue: #003087;
            --carrefour-red: #ed1c24;
            --carrefour-light-blue: #0056b3;
            --white: #ffffff;
            --gray: #f4f7f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            overflow: hidden; /* una sola pantalla: nada de scroll */
        }

        body {
            font-family: 'Open Sans', sans-serif;
            /* velo azul oscuro encima de la foto para que la tarjeta resalte y se lea bien */
            background:
                linear-gradient(135deg, rgba(0,26,77,0.72), rgba(0,48,135,0.70)),
                url('FondoPagina.jpg') center center / cover no-repeat;
            min-height: 100vh;
            min-height: 100dvh; /* en mobile descuenta la barra del navegador */
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            padding: 20px;
        }

        .card {
            background: var(--white);
            width: 90%;
            max-width: 400px;
            padding: 40px 30px 28px; /* abajo un poco menos: poco espacio bajo el botón */
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            /* alto automático: el borde inferior crece solo cuando aparece el mensaje */
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .logo-container {
            width: 100px;
            height: 100px;
            background: var(--white);
            border-radius: 50%;
            margin: -90px auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border: 4px solid var(--white);
            overflow: hidden; /* Para que la imagen se adapte al círculo */
        }

        .logo-container img {
            width: 85%;
            height: 85%;
            object-fit: contain;
        }

        h1 {
            font-family: 'Segoe UI', sans-serif;
            color: var(--carrefour-blue) !important;
            font-weight: 800 !important;
            font-size: 1.8rem !important;
            margin-bottom: 15px !important;
        }

        p {
            font-size: 1rem;
            color: #000;
            font-weight: 700 !important;
            line-height: 1.55;
            margin-bottom: 30px !important;
        }

        .btn-request {
            background: var(--carrefour-blue);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.4rem;
            font-weight: 700;
            border-radius: 100px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 6px 0 #001f57;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-request:hover {
            background: #0040b3;
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #001f57;
        }

        .btn-request:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #001f57;
        }

        .btn-request:disabled {
            background: #ccc !important;
            box-shadow: 0 4px 0 #999 !important;
            transform: translateY(2px) !important;
            cursor: not-allowed;
        }

        /* Animación de carga */
        .loader {
            display: none;
            width: 25px;
            height: 25px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #status {
            margin-top: 14px;
            min-height: 0; /* vacío no reserva espacio; al mostrar el mensaje, la tarjeta crece abajo */
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            opacity: 0;
        }

        #status.show {
            opacity: 1;
        }

        .success { color: #2ecc71; }
        .error { color: var(--carrefour-red); }
        .info { color: var(--carrefour-blue); }

        /* Efecto Confeti sutil al éxito */
        .confetti-piece {
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--carrefour-blue);
            opacity: 0;
        }

        @media (max-width: 480px) {
            .card {
                padding: 40px 20px;
            }
            h1 { font-size: 1.6rem; }
        }
    </style>
  </head>
  <body>
    <div class="card">
        <div class="logo-container">
            <img src="LogoCarrefour.png" alt="Logo Carrefour">
        </div>
        <h1>¿Necesitás un asesor?</h1>
        <p>Estamos para ayudarte. Tocá el botón y un asesor del sector vendrá enseguida.</p>
        
        <button id="requestBtn" class="btn-request" onclick="solicitarAsesor()">
            <span id="btnText">Solicitar</span>
            <div class="loader" id="loader"></div>
        </button>

        <div id="status"></div>
    </div>

    <script>
        const API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
            ? 'http://localhost:3000'
            : 'https://carrefour-bot.onrender.com';

        async function verificarEstado() {
            try {
                const r = await fetch(`${API}/estado`);
                const data = await r.json();
                const btn = document.getElementById('requestBtn');
                const status = document.getElementById('status');
                if (!data.abierto) {
                    btn.disabled = true;
                    status.innerText = `⏰ Fuera de horario de atención (${data.horario.desde} – ${data.horario.hasta}).`;
                    status.className = 'info show';
                } else {
                    // Solo rehabilita si estaba cerrado (no interrumpe cooldown activo)
                    if (status.innerText.startsWith('⏰')) {
                        btn.disabled = false;
                        status.classList.remove('show');
                    }
                }
            } catch (e) { /* si falla la red, no toca nada */ }
        }

        verificarEstado();
        setInterval(verificarEstado, 3000);

        // Campanita sintetizada (Web Audio): dos notas tipo "ding-dong", sin archivo.
        function sonarCampana() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                [880, 1318.5].forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    const t = ctx.currentTime + i * 0.13;
                    gain.gain.setValueAtTime(0.0001, t);
                    gain.gain.exponentialRampToValueAtTime(0.3, t + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.6);
                    osc.start(t);
                    osc.stop(t + 0.6);
                });
            } catch (e) { /* navegador sin Web Audio: se ignora */ }
        }

        async function solicitarAsesor() {
            const btn = document.getElementById('requestBtn');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const status = document.getElementById('status');

            // Estado de carga
            btn.disabled = true;
            btnText.style.display = 'none';
            loader.style.display = 'block';
            status.innerText = "";
            status.classList.remove('show');

            try {
                const response = await fetch(`${API}/solicitar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                const data = await response.json();

                // Cooldown activo: un cliente ya avisó hace poco. No es error, solo esperar.
                if (response.status === 429) {
                    loader.style.display = 'none';
                    btnText.style.display = 'block';
                    btn.disabled = false;
                    status.innerText = "⏳ " + data.message;
                    status.className = "info show";
                    return;
                }

                if (data.success) {
                    loader.style.display = 'none';
                    btnText.style.display = 'block';
                    btnText.innerText = "¡En camino!";

                    status.innerHTML = "✅ Solicitud enviada.<br>Un asesor se dirige hacia aquí, espere en punto de venta";
                    status.className = "success show";

                    // Campanita + vibración suave en el éxito
                    sonarCampana();
                    navigator.vibrate?.([100, 30, 100]);

                    setTimeout(() => {
                        btn.disabled = false;
                        btnText.innerText = "Solicitar";
                        status.classList.remove('show');
                    }, 40000);
                } else {
                    throw new Error();
                }
            } catch (error) {
                loader.style.display = 'none';
                btnText.style.display = 'block';
                btn.disabled = false;
                status.innerText = "❌ No pudimos avisar. Intentá de nuevo.";
                status.className = "error show";
            }
        }
    </script>
  </body>
</html>
