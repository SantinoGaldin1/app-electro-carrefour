<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Asesor - Carrefour</title>
    <style>
        :root {
            --carrefour-blue: #003087;
            --carrefour-red: #ed1c24;
            --carrefour-light-blue: #0056b3;
            --white: #ffffff;
            --gray: #f4f7f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background: linear-gradient(135deg, var(--carrefour-blue) 0%, #001a4d 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            overflow: hidden;
        }

        /* Fondo decorativo con "C" de Carrefour sutil */
        body::before {
            content: "";
            position: absolute;
            width: 150%;
            height: 150%;
            background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 0;
        }

        .card {
            background: var(--white);
            width: 90%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .logo-container {
            width: 100px;
            height: 100px;
            background: var(--white);
            border-radius: 50%;
            margin: -90px auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border: 4px solid var(--white);
            overflow: hidden; /* Para que la imagen se adapte al círculo */
        }

        .logo-container img {
            width: 85%;
            height: 85%;
            object-fit: contain;
        }

        h1 {
            font-family: 'Segoe UI', sans-serif;
            color: var(--carrefour-blue) !important;
            font-weight: 800 !important;
            font-size: 1.8rem !important;
            margin-bottom: 15px !important;
            white-space: nowrap !important;
        }

        p {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.5;
            margin-bottom: 30px !important;
        }

        .btn-request {
            background: var(--carrefour-blue);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.4rem;
            font-weight: 700;
            border-radius: 100px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 6px 0 #001f57;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-request:hover {
            background: #0040b3;
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #001f57;
        }

        .btn-request:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #001f57;
        }

        .btn-request:disabled {
            background: #ccc !important;
            box-shadow: 0 4px 0 #999 !important;
            transform: translateY(2px) !important;
            cursor: not-allowed;
        }

        /* Animación de carga */
        .loader {
            display: none;
            width: 25px;
            height: 25px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #status {
            margin-top: 25px;
            min-height: 24px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            opacity: 0;
        }

        #status.show {
            opacity: 1;
        }

        .success { color: #2ecc71; }
        .error { color: var(--carrefour-red); }
        .info { color: var(--carrefour-blue); }

        /* Efecto Confeti sutil al éxito */
        .confetti-piece {
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--carrefour-blue);
            opacity: 0;
        }

        @media (max-width: 480px) {
            .card {
                padding: 40px 20px;
            }
            h1 { font-size: 1.6rem; }
        }
    </style>
  </head>
  <body>
    <div class="card">
        <div class="logo-container">
            <img src="LogoCarrefour.png" alt="Logo Carrefour">
        </div>
        <h1>¿Necesitás un asesor?</h1>
        <p>Estamos para ayudarte. Tocá el botón y un asesor del sector vendrá enseguida.</p>
        
        <button id="requestBtn" class="btn-request" onclick="solicitarAsesor()">
            <span id="btnText">Solicitar</span>
            <div class="loader" id="loader"></div>
        </button>

        <div id="status"></div>
    </div>

    <script>
        async function solicitarAsesor() {
            const btn = document.getElementById('requestBtn');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const status = document.getElementById('status');

            // Estado de carga
            btn.disabled = true;
            btnText.style.display = 'none';
            loader.style.display = 'block';
            status.innerText = "";
            status.classList.remove('show');

            // ponytail: local apunta al backend de tu maquina, en vivo a Render. Sin toggle manual.
            const API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
                ? 'http://localhost:3000'
                : 'https://carrefour-bot.onrender.com';

            try {
                const response = await fetch(`${API}/solicitar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                const data = await response.json();

                // Cooldown activo: un cliente ya avisó hace poco. No es error, solo esperar.
                if (response.status === 429) {
                    loader.style.display = 'none';
                    btnText.style.display = 'block';
                    btn.disabled = false;
                    status.innerText = "⏳ " + data.message;
                    status.className = "info show";
                    return;
                }

                if (data.success) {
                    loader.style.display = 'none';
                    btnText.style.display = 'block';
                    btnText.innerText = "¡En camino!";

                    status.innerHTML = "✅ Solicitud enviada.<br>Un asesor se dirige hacia aquí, espere en punto de venta";
                    status.className = "success show";

                    // Efecto de vibración suave en el éxito
                    navigator.vibrate?.([100, 30, 100]);

                    setTimeout(() => {
                        btn.disabled = false;
                        btnText.innerText = "Solicitar";
                        status.classList.remove('show');
                    }, 40000);
                } else {
                    throw new Error();
                }
            } catch (error) {
                loader.style.display = 'none';
                btnText.style.display = 'block';
                btn.disabled = false;
                status.innerText = "❌ No pudimos avisar. Intentá de nuevo.";
                status.className = "error show";
            }
        }
    </script>
  </body>
</html>
